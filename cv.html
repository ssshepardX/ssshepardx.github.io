<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Furkan Çoban - CV">
    <meta name="theme-color" content="#7C3AED">
    <title>CV | Furkan Çoban</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=4.1">
</head>
<body>
    <div class="cv-viewer-page">
        <header class="cv-viewer-toolbar">
            <a href="index.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Geri</a>
            <h1>Furkan Çoban CV</h1>
            <a href="assets/LatestCV_FurkanCoban.pdf" download="Furkan_Coban_CV.pdf" class="btn js-cv-download"><i class="fas fa-download"></i> İndir</a>
        </header>
        <main class="cv-viewer-frame">
            <iframe src="assets/LatestCV_FurkanCoban.pdf#toolbar=1&navpanes=0&scrollbar=1" title="Furkan Çoban CV"></iframe>
            <p class="cv-viewer-fallback">
                PDF görüntülenemiyorsa
                <a href="assets/LatestCV_FurkanCoban.pdf" target="_blank" rel="noopener">buradan aç</a>
                veya
                <a href="assets/LatestCV_FurkanCoban.pdf" download="Furkan_Coban_CV.pdf" class="js-cv-download">indir</a>.
            </p>
        </main>
    </div>
    <script>
        document.querySelectorAll('.js-cv-download').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                fetch('assets/LatestCV_FurkanCoban.pdf')
                    .then(function(response) { return response.blob(); })
                    .then(function(blob) {
                        var url = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = 'Furkan_Coban_CV.pdf';
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
                    })
                    .catch(function() {
                        window.open('assets/LatestCV_FurkanCoban.pdf', '_blank', 'noopener');
                    });
            });
        });
    </script>
</body>
</html>
